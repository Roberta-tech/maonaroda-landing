<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mão na Roda - Serviços Locais</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: white;
            overflow-x: hidden;
        }

        /* CABEÇALHO */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(10, 10, 10, 0.9);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-img-head {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            /* Brilho Azul no header */
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.6), 0 0 20px rgba(0, 229, 255, 0.3);
            object-fit: cover;
        }
        .logo-title {
            color: #00E5FF;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6); /* Título brilha */
            font-size: 22px;
            font-weight: 900;
            font-style: italic;
            margin: 0;
        }
        .btn-header {
            background-color: #ff0080;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            /* Brilho rosa */
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.4);
        }
        .btn-header:hover {
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.8), 0 0 10px rgba(255, 255, 255, 0.3);
            transform: scale(1.03);
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 100px 5% 80px 5%;
            flex-wrap: wrap;
        }
        .hero-text {
            flex: 1;
            min-width: 300px;
        }
        .hero-text h3 {
            color: #00E5FF;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            letter-spacing: 2px;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .hero-text h1 {
            font-size: 55px;
            font-weight: 900;
            margin: 0 0 20px 0;
            line-height: 1.1;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .hero-text p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 45px;
            max-width: 500px;
        }
        .btn-main {
            display: inline-block;
            background-color: #ff0080;
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            /* Brilho Neon Rosa Intenso */
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.6), 0 0 30px rgba(255, 0, 128, 0.3), 0 0 45px rgba(255, 0, 128, 0.1);
            margin-bottom: 35px;
            transition: 0.3s;
        }
        .btn-main:hover {
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.9), 0 0 10px rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }
        
        .stores {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .store-btn {
            display: flex;
            align-items: center;
            background: black;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            cursor: default;
        }
        .store-btn span {
            display: block;
            font-size: 10px;
            color: #888;
        }
        .store-btn strong {
            font-size: 16px;
        }

        /* 🛠️ MOLDURA NEON DA ENGRENAGEM PRINCIPAL */
        .hero-img {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 300px;
            margin-top: 40px;
        }
        .logo-circle-frame {
            width: 400px; /* MAIOR */
            height: 400px;
            border-radius: 50%;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 🛠️ Moldura Neon Mista (Azul e Rosa) */
            border: 4px solid #00E5FF;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.8), 0 0 45px rgba(255, 0, 128, 0.5), inset 0 0 20px rgba(0, 229, 255, 0.5);
            padding: 15px;
            overflow: hidden;
        }
        .logo-oficial-big {
            width: 90%; /* Se ajusta dentro da moldura */
            object-fit: contain;
        }

        /* FEATURES */
        .features {
            background-color: #0c0c0c;
            padding: 100px 5%;
            text-align: center;
        }
        .features h2 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 60px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .cards {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background-color: #1A1A1A;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 35px;
            width: 280px;
            text-align: left;
            transition: 0.3s;
        }
