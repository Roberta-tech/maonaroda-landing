<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mão na Roda - Mais que um App!</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://tally.so/widgets/embed.js"></script>

    <style>
        :root { 
            --primary-blue: #00AEEF; 
            --pure-black: #000000; 
            --insta-pink: #E1306C; 
        }
        body { 
            background-color: var(--pure-black); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            overflow-x: hidden;
        }
        .container { padding: 20px; max-width: 600px; width: 100%; }
        .logo-img { width: 280px; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; line-height: 1.2; }
        h1 span { color: var(--primary-blue); }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6; }
        
        .cta-button {
            background-color: var(--primary-blue);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 174, 239, 0.4);
        }
        .cta-button:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 30px rgba(0, 174, 239, 0.6); 
        }

        .instagram-float { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background-color: var(--insta-pink); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: bold; 
            z-index: 1000; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .instagram-float:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Mão na Roda" class="logo-img">
        
        <h1>Mais que um App, uma <br><span>Mão na Roda!</span></h1>
        
        <p>Onde você estiver, a solução que você precisa. <br>Conectando profissionais e clientes em todo o Brasil.</p>

        <button 
            class="cta-button" 
            data-tally-open="mO069v" 
            data-tally-layout="modal" 
            data-tally-emoji-text="👋" 
            data-tally-emoji-animation="wave">
            QUERO ACESSO ANTECIPADO
        </button>
    </div>

    <a href="https://www.instagram.com/appmaonaroda/" class="instagram-float" target="_blank">
        <svg width="18" height="18" fill="white" viewBox="0 0 24 24">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.162 6.162 6.162 6.162-2.759 6.162-6.162-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>

        <span>Siga no Instagram</span>
    </a>

</body>
</html>
