<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mão na Roda | Soluções Inteligentes</title>
<style>
:root { --pure-black: #000000; --main-gold: #D4AF37; --pure-white: #ffffff; --soft-gray: #1a1a1a; }
body { background-color: var(--pure-black); color: var(--pure-white); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
.container { padding: 40px 20px; max-width: 450px; width: 100%; }
.logo { font-size: 2.8rem; font-weight: bold; color: var(--main-gold); margin-bottom: 5px; }
h2 { font-weight: 300; font-size: 1.1rem; margin-bottom: 30px; color: #aaa; }
form { background: var(--soft-gray); padding: 30px; border-radius: 15px; border: 1px solid #333; }
input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
button { width: 100%; padding: 18px; background-color: var(--main-gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
.footer { margin-top: 50px; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="container">
<div class="logo">MÃO NA RODA</div>
<h2>Sua solução inteligente está chegando.</h2>
<form id="leadForm">
<input type="text" id="name" placeholder="Nome Completo" required>
<input type="email" id="email" placeholder="E-mail" required>
<input type="tel" id="whatsapp" placeholder="WhatsApp (com DDD)" required>
<button type="submit" id="btnEnviar">QUERO SER AVISADO</button>
</form>
<div class="footer">UMA STARTUP ÍMPETUS © 2026</div>
</div>

</body>
</html>
